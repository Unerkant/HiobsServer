# Server Port, HTTPS(SSL) Zertifikat
# :::::::::::::::::::::::::::::::::::::::::::::::
spring.application.name=HiobsServer
server.address=0.0.0.0

# hiobsServer Zertifikat HTTPS(SSL) (Port 8080)
server.port=8080
server.ssl.key-store=classpath:hiobs-keystore.p12
server.ssl.key-store-password=hiobs123
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=hiobs

